<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --border: #2a2a2a;
            --accent: #00e5ff;
            --accent2: #ff6b35;
            --text: #e8e8e8;
            --muted: #666;
            --success: #00c896;
            --error: #ff4757;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px;
            color: var(--accent); text-decoration: none;
        }
        .nav-brand span { color: var(--accent2); }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a {
            color: var(--muted); text-decoration: none; font-size: 0.9rem;
            font-family: 'Space Mono', monospace; transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--accent); }
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.85rem;
            font-family: 'Space Mono', monospace; font-weight: 700;
            border: none; cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #00bcd4; transform: translateY(-1px); }
        .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
        .btn-danger:hover { background: var(--error); color: #fff; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #333; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        .flash-messages { margin-bottom: 1.5rem; }
        .flash {
            padding: 0.8rem 1.2rem; border-radius: 4px; margin-bottom: 0.5rem;
            font-family: 'Space Mono', monospace; font-size: 0.85rem;
            border-left: 3px solid;
        }
        .flash.success { background: rgba(0,200,150,0.1); border-color: var(--success); color: var(--success); }
        .flash.error { background: rgba(255,71,87,0.1); border-color: var(--error); color: var(--error); }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .page-title { font-size: 1.8rem; font-weight: 800; }
        .page-title span { color: var(--accent); }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #1a1a1a; padding: 0.9rem 1.2rem; text-align: left;
            font-family: 'Space Mono', monospace; font-size: 0.75rem;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
        }
        td { padding: 1rem 1.2rem; border-top: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background: rgba(0,229,255,0.03); }
        .badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px;
            font-size: 0.75rem; font-family: 'Space Mono', monospace;
            background: rgba(0,229,255,0.1); color: var(--accent);
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--muted); font-family: 'Space Mono', monospace; }
        input, select {
            width: 100%; padding: 0.7rem 1rem; background: var(--bg);
            border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        .search-bar {
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
        }
        .search-bar input { max-width: 350px; }
        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.9rem;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
        .actions { display: flex; gap: 0.5rem; }
        .form-card { max-width: 600px; }
        .form-card .card { padding: 2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-actions { display: flex; gap: 1rem; margin-top: 2rem; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand">Student<span>MS</span></a>
    <div class="nav-links">
        <a href="/">All Students</a>
        <a href="/add" class="btn btn-primary">+ Add Student</a>
    </div>
</nav>
<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages" id="flash-messages">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
<script>
    setTimeout(() => {
        const f = document.getElementById('flash-messages');
        if (f) f.style.opacity = '0', f.style.transition = 'opacity 0.5s', setTimeout(() => f.remove(), 500);
    }, 4000);
</script>
</body>
</html>
