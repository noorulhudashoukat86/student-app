{% extends 'base.html' %}
{% block title %}Edit Student - SMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Edit <span>Student</span></h1>
    <a href="/" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card">
    <div class="card">
        <form action="/edit/{{ student.id }}" method="post" id="edit-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" name="name" id="name" value="{{ student.name }}" required>
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" value="{{ student.roll_no }}" disabled style="opacity:0.5">
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" name="email" id="email" value="{{ student.email }}" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="department">Department</label>
                    <select name="department" id="department">
                        <option value="">Select Department</option>
                        {% for dept in ['Computer Science','Data Science','Artificial Intelligence','Software Engineering','Electrical Engineering'] %}
                        <option value="{{ dept }}" {% if student.department == dept %}selected{% endif %}>{{ dept }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="gpa">GPA (0.0 - 4.0)</label>
                    <input type="number" name="gpa" id="gpa" value="{{ student.gpa or '' }}" min="0" max="4" step="0.01">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="update-btn">Update Student</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
