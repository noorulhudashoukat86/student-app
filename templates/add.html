{% extends 'base.html' %}
{% block title %}Add Student - SMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Add <span>Student</span></h1>
    <a href="/" class="btn btn-secondary">← Back</a>
</div>
<div class="form-card">
    <div class="card">
        <form action="/add" method="post" id="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" name="name" id="name" placeholder="e.g. Ali Hassan" required>
                </div>
                <div class="form-group">
                    <label for="roll">Roll Number *</label>
                    <input type="text" name="roll" id="roll" placeholder="e.g. BCS-7-001" required>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" name="email" id="email" placeholder="e.g. ali@university.edu" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="department">Department</label>
                    <select name="department" id="department">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="gpa">GPA (0.0 - 4.0)</label>
                    <input type="number" name="gpa" id="gpa" placeholder="e.g. 3.5" min="0" max="4" step="0.01">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submit-btn">Add Student</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
